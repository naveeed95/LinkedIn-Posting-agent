name: Enable Daily Post

on:
  workflow_dispatch:

jobs:
  enable:
    runs-on: ubuntu-latest
    steps:
      - name: Re-enable daily_post.yml
        run: gh workflow enable daily_post.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger daily post immediately
        run: gh workflow run daily_post.yml --ref master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
