name: Weekly Performance Report

on:
  schedule:
    - cron: '0 15 * * 0'  # Sunday 8pm PKT
  workflow_dispatch:

concurrency:
  group: posting-agent-db
  cancel-in-progress: false

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore performance DB
        uses: actions/cache@v4
        with:
          path: performance.db
          key: performance-db-${{ github.run_id }}
          restore-keys: |
            performance-db-

      - name: Poll all recent metrics
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_ORG_URN: ${{ secrets.LINKEDIN_ORG_URN }}
          LOG_FORMAT: json
        run: python analytics_tracker.py --poll

      - name: Send weekly report to Discord
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_ANALYTICS_CHANNEL_ID: ${{ secrets.DISCORD_ANALYTICS_CHANNEL_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          LOG_FORMAT: json
        run: python discord_bot.py --send-weekly-report
        continue-on-error: true
