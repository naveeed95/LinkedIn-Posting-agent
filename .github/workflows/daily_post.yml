name: Daily LinkedIn Post

on:
  schedule:
    - cron: '0 8 * * *'  # 1pm PKT (UTC+5), every day including weekends
  workflow_dispatch:

concurrency:
  group: posting-agent-db
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download performance DB
        uses: actions/download-artifact@v4
        with:
          name: performance-db
          path: .
        continue-on-error: true

      - name: Prepare cache directory
        run: mkdir -p cache

      - name: Download LinkedIn rules cache
        uses: actions/download-artifact@v4
        with:
          name: linkedin-rules
          path: cache/
        continue-on-error: true

      - name: Download existing schedule
        uses: actions/download-artifact@v4
        with:
          name: weekly-schedule
          path: .
        continue-on-error: true

      - name: Run auto post
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_ORG_URN: ${{ secrets.LINKEDIN_ORG_URN }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_APPROVALS_CHANNEL_ID: ${{ secrets.DISCORD_APPROVALS_CHANNEL_ID }}
          DISCORD_POSTED_CHANNEL_ID: ${{ secrets.DISCORD_POSTED_CHANNEL_ID }}
          DISCORD_ANALYTICS_CHANNEL_ID: ${{ secrets.DISCORD_ANALYTICS_CHANNEL_ID }}
          DISCORD_PLAN_CHANNEL_ID: ${{ secrets.DISCORD_PLAN_CHANNEL_ID }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
          LANDING_PAGE_URL: ${{ secrets.LANDING_PAGE_URL }}
        run: python run.py auto

      - name: Upload performance DB
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-db
          path: performance.db
          retention-days: 90

      - name: Upload LinkedIn rules cache
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linkedin-rules
          path: cache/linkedin_rules.json
          retention-days: 7
        continue-on-error: true

      - name: Upload schedule
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: weekly-schedule
          path: weekly_schedule.json
          retention-days: 90

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_ANALYTICS_CHANNEL_ID: ${{ secrets.DISCORD_ANALYTICS_CHANNEL_ID }}
        run: |
          python notify_failure.py \
            --workflow-name "Daily Post" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
