name: Daily LinkedIn Post

on:
  schedule:
    - cron: '0 8 * * *'  # 1pm PKT (UTC+5), every day including weekends
  workflow_dispatch:
    inputs:
      preview:
        description: 'Preview mode — generate and score but do NOT post to LinkedIn'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      force:
        description: 'Force run — bypass dedup check even if already ran today'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

concurrency:
  group: posting-agent-db
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download performance DB
        uses: actions/download-artifact@v4
        with:
          name: performance-db
          path: .
        continue-on-error: true

      - name: Prepare cache directory
        run: mkdir -p cache

      - name: Download LinkedIn rules cache
        uses: actions/download-artifact@v4
        with:
          name: linkedin-rules
          path: cache/
        continue-on-error: true

      - name: Download existing schedule
        uses: actions/download-artifact@v4
        with:
          name: weekly-schedule
          path: .
        continue-on-error: true

      - name: Skip if already posted today
        id: dedup
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "Force flag set — bypassing dedup check."
            echo "result=" >> $GITHUB_OUTPUT
            exit 0
          fi
          RESULT=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/daily_post.yml/runs?per_page=10&status=success" \
            | python3 -c "
          import json, sys
          try:
              data = json.load(sys.stdin)
              today = '$(date -u +%Y-%m-%d)'
              current = '${{ github.run_id }}'
              for r in data.get('workflow_runs', []):
                  if str(r['id']) != current and r['created_at'].startswith(today):
                      print('skip')
                      break
          except Exception as e:
              print(f'dedup check error: {e}', file=sys.stderr)
          ")
          echo "result=$RESULT" >> $GITHUB_OUTPUT
          [ "$RESULT" = "skip" ] && echo "Already posted today — skipping duplicate run." || echo "No duplicate found — proceeding."

      - name: Run auto post
        if: steps.dedup.outputs.result != 'skip'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_ORG_URN: ${{ secrets.LINKEDIN_ORG_URN }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_APPROVALS_CHANNEL_ID: ${{ secrets.DISCORD_APPROVALS_CHANNEL_ID }}
          DISCORD_POSTED_CHANNEL_ID: ${{ secrets.DISCORD_POSTED_CHANNEL_ID }}
          DISCORD_ANALYTICS_CHANNEL_ID: ${{ secrets.DISCORD_ANALYTICS_CHANNEL_ID }}
          DISCORD_PLAN_CHANNEL_ID: ${{ secrets.DISCORD_PLAN_CHANNEL_ID }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
          LANDING_PAGE_URL: ${{ secrets.LANDING_PAGE_URL }}
        run: |
          if [ "${{ github.event.inputs.preview }}" = "true" ]; then
            python run.py auto --preview
          else
            python run.py auto
          fi

      - name: Upload performance DB
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-db
          path: performance.db
          retention-days: 90

      - name: Upload LinkedIn rules cache
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linkedin-rules
          path: cache/linkedin_rules.json
          retention-days: 7
        continue-on-error: true

      - name: Upload schedule
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: weekly-schedule
          path: weekly_schedule.json
          retention-days: 90

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_ANALYTICS_CHANNEL_ID: ${{ secrets.DISCORD_ANALYTICS_CHANNEL_ID }}
        run: |
          python notify_failure.py \
            --workflow-name "Daily Post" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
