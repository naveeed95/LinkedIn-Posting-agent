name: Daily LinkedIn Post

on:
  schedule:
    - cron: '0 8 * * 1-5'  # 1pm PKT (UTC+5), Mon-Fri
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Download performance DB
        uses: actions/download-artifact@v4
        with:
          name: performance-db
          path: .
        continue-on-error: true

      - name: Download LinkedIn rules cache
        uses: actions/download-artifact@v4
        with:
          name: linkedin-rules
          path: cache/
        continue-on-error: true

      - name: Run auto post
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_ORG_URN: ${{ secrets.LINKEDIN_ORG_URN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_APPROVALS_CHANNEL_ID: ${{ secrets.DISCORD_APPROVALS_CHANNEL_ID }}
          DISCORD_POSTED_CHANNEL_ID: ${{ secrets.DISCORD_POSTED_CHANNEL_ID }}
          DISCORD_ANALYTICS_CHANNEL_ID: ${{ secrets.DISCORD_ANALYTICS_CHANNEL_ID }}
          DISCORD_COMMENTS_CHANNEL_ID: ${{ secrets.DISCORD_COMMENTS_CHANNEL_ID }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          LANDING_PAGE_URL: ${{ secrets.LANDING_PAGE_URL }}
        run: python run.py auto

      - name: Upload performance DB
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-db
          path: performance.db
          retention-days: 90

      - name: Upload schedule
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: weekly-schedule
          path: weekly_schedule.json
          retention-days: 90
